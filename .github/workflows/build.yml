name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install customtkinter openpyxl reportlab pillow pyinstaller tkinterdnd2

    - name: Build EXE
      run: |
        pip show tkinterdnd2
        $dndPath = python -c "import tkinterdnd2, os; print(os.path.dirname(tkinterdnd2.__file__))"
        pyinstaller --onefile --windowed --noconsole --add-data "Logo.png;." --add-data "$dndPath;tkinterdnd2" --name "ScheduleReportForPayroll" app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: ScheduleReportForPayroll-Windows
        path: dist/ScheduleReportForPayroll.exe